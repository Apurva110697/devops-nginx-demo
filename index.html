<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevOps Journey</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            color: #ffffff;
            text-align: center;
            padding: 50px 20px;
        }

        .container {
            background: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border-radius: 15px;
            max-width: 700px;
            margin: auto;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 36px;
        }

        h2 {
            margin-top: 0;
            font-weight: normal;
            color: #f1f1f1;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        .highlight {
            color: #00ffcc;
            font-weight: bold;
        }

        .footer {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.8;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background-color: #00ffcc;
            color: #000;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome Dosto 👋</h1>
        <h2>Wishing You Luck on Your DevOps Journey 🚀</h2>

        <p>Yeahhhh! 🎉</p>

        <p>This is a <span class="highlight">good feature</span> added.</p>
        <p>This is the <span class="highlight">coolest feature</span> in dev!</p>
        <p>Adding cool features and improving every day.</p>
        <p>This feature was successfully added from the <strong>dev</strong> branch.</p>

        <button>Explore More</button>

        <div class="footer">
            Made with ❤️ for DevOps learners
        </div>
    </div>

</body>
</html>
